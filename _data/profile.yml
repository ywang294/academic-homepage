short_bio: >-
  <p>
    I am an Assistant Professor in the <a href="https://www.ece.ucf.edu/" target="_blank">Department of Electrical and Computer Engineering</a> 
    (jointly appointed with the <a href="https://cs.ucf.edu/" target="_blank">Computer Science Department</a>) at the 
    <a href="https://www.ucf.edu/" target="_blank">University of Central Florida (UCF)</a>. 
    I am also affiliated with the <a href="https://ai.ucf.edu/" target="_blank">Artificial Intelligence Institute</a>.
  </p>
  <p>
    My research interests specialize in machine learning, with a primary focus on <strong>reinforcement learning (RL), optimization, and generative models</strong>.
  </p>
  <p>
    <strong>Prospective Students:</strong> I am looking for highly motivated Ph.D. students with strong backgrounds in mathematics, 
    statistics, computer science, or electrical engineering. If you are interested in working with me, 
    please send me an email with your CV and transcripts.
  </p>

